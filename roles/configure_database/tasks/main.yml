---

- name: Start MariaDB service
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: yes

- name: Create database password
  ansible.builtin.shell:
    cmd: "umask 077 && tr -dc A-Za-z0-9 </dev/urandom | head -c 32 > {{ app_directory }}/.db_password"
    creates: "{{ app_directory }}/.db_password"
  become_user: "{{ app_user }}"

- name: Get database password
  ansible.builtin.shell:
    cmd: "cat {{ app_directory }}/.db_password"
  changed_when: false
  register: get_db_password

- name: Set db_password fact
  set_fact:
    db_password: "{{ get_db_password.stdout }}"

- name: Create .mariadb_password file
  ansible.builtin.template:
    src: mariadb_password.j2
    dest: "{{ app_directory }}/.mariadb_password"
    owner: "{{ app_user }}"
    mode: 0700

- name: Create application DB
  community.mysql.mysql_db:
    name: "{{ db_name }}"
    state: present

- name: Create application DB user
  community.mysql.mysql_user:
    name: "{{ db_user }}"
    priv: "{{ db_name }}.*:ALL"
    password: "{{ db_password }}"
    
- name: Create DB schema
  ansible.builtin.shell:
    cmd: |
      /usr/bin/mysql \
      --defaults-extra-file='{{ app_directory }}/.mariadb_password' \
      -u {{ db_user }} \
      {{ db_name }} \
      < '{{ app_directory }}/gEAR/create_schema.sql' \
      && touch '{{ app_directory }}/.db_setup_done'
    creates: "{{ app_directory }}/.db_setup_done"
  become_user: "{{ app_user }}"

       
